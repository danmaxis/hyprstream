<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>RAM Usage settings</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #1f1f28; color: #c0caf5; margin: 0; padding: 16px; line-height: 1.45; }
    label { display: block; margin-bottom: 12px; font-size: 13px; }
    input[type=number] { width: 100%; padding: 6px 8px; box-sizing: border-box; background: #2a2e3a; border: 1px solid #414868; border-radius: 4px; color: inherit; font-size: 13px; }
    .legend { background: #1a1b26; padding: 10px 12px; border-radius: 6px; border-left: 3px solid #7dcfff; font-size: 12px; color: #a9b1d6; }
  </style>
</head>
<body>
  <label>Warn threshold (%) <input id="warnPct" type="number" min="1" max="100" value="75"/></label>
  <label>Critical threshold (%) <input id="critPct" type="number" min="1" max="100" value="90"/></label>
  <div class="legend">
    Memory pressure read from <code>/proc/meminfo</code>. Uses <code>MemAvailable</code> (kernel 3.14+) for the "free" figure, with a fallback to <code>MemFree + Buffers + Cached</code>. Label includes total RAM in GB. Refreshes every 2s. Display-only.
  </div>
  <script>
    let websocket = null, uuid = null;
    function connect(inPort, inUUID, inRegisterEvent, _, inActionInfo) {
      uuid = inUUID;
      const s = (JSON.parse(inActionInfo).payload?.settings) ?? {};
      document.getElementById("warnPct").value = s.warnPct ?? 75;
      document.getElementById("critPct").value = s.critPct ?? 90;
      websocket = new WebSocket("ws://127.0.0.1:" + inPort);
      websocket.onopen = () => websocket.send(JSON.stringify({ event: inRegisterEvent, uuid: inUUID }));
    }
    function send() {
      if (!websocket || websocket.readyState !== 1) return;
      websocket.send(JSON.stringify({ event: "setSettings", context: uuid, payload: {
        warnPct: Number(document.getElementById("warnPct").value) || 75,
        critPct: Number(document.getElementById("critPct").value) || 90,
      }}));
    }
    for (const id of ["warnPct","critPct"]) document.getElementById(id).addEventListener("change", send);
    window.connectElgatoStreamDeckSocket = connect;
  </script>
</body>
</html>
