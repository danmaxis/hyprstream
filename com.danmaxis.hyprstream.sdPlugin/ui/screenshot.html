<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Screenshot settings</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #1f1f28; color: #c0caf5; margin: 0; padding: 16px; line-height: 1.45; }
    label { display: block; margin-bottom: 12px; font-size: 13px; }
    select {
      width: 100%; padding: 6px 8px; box-sizing: border-box;
      background: #2a2e3a; border: 1px solid #414868; border-radius: 4px;
      color: inherit; font-size: 13px;
    }
    .legend { background: #1a1b26; padding: 10px 12px; border-radius: 6px; border-left: 3px solid #7dcfff; font-size: 12px; color: #a9b1d6; }
  </style>
</head>
<body>
  <label>
    Screenshot mode
    <select id="mode">
      <option value="region">Region — drag a selection, copy to clipboard</option>
      <option value="full">Full — focused output, copy to clipboard</option>
      <option value="full-file">Full + Save — focused output, save AND copy</option>
    </select>
  </label>

  <div class="legend">
    Calls <code>grim</code>/<code>slurp</code>/<code>wl-copy</code> directly. <strong>Region</strong> prompts you to drag a rectangle (the standard slurp UI); <strong>full</strong> grabs the focused output without prompting; <strong>full + save</strong> additionally writes the PNG to <code>~/Pictures/Screenshots/screenshot-&lt;timestamp&gt;.png</code>. The icon stays static — fire-and-forget.
  </div>

  <script>
    let websocket = null, uuid = null, actionInfo = null;
    function connectElgatoStreamDeckSocket(inPort, inUUID, inRegisterEvent, inInfo, inActionInfo) {
      uuid = inUUID;
      actionInfo = JSON.parse(inActionInfo);
      const settings = actionInfo.payload?.settings ?? {};
      document.getElementById("mode").value = settings.mode ?? "region";
      websocket = new WebSocket("ws://127.0.0.1:" + inPort);
      websocket.onopen = () => websocket.send(JSON.stringify({ event: inRegisterEvent, uuid: inUUID }));
    }
    function send() {
      if (!websocket || websocket.readyState !== 1) return;
      websocket.send(JSON.stringify({
        event: "setSettings", context: uuid,
        payload: { mode: document.getElementById("mode").value },
      }));
    }
    document.getElementById("mode").addEventListener("change", send);
    window.connectElgatoStreamDeckSocket = connectElgatoStreamDeckSocket;
  </script>
</body>
</html>
