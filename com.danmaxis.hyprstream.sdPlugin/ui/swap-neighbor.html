<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Swap Window with Neighbor settings</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #1f1f28; color: #c0caf5; margin: 0; padding: 16px; line-height: 1.45; }
    label { display: block; margin-bottom: 12px; font-size: 13px; }
    select {
      width: 100%; padding: 6px 8px; box-sizing: border-box;
      background: #2a2e3a; border: 1px solid #414868; border-radius: 4px;
      color: inherit; font-size: 13px;
    }
    .legend { background: #1a1b26; padding: 10px 12px; border-radius: 6px; border-left: 3px solid #bb9af7; font-size: 12px; color: #a9b1d6; }
  </style>
</head>
<body>
  <label>
    Direction
    <select id="direction">
      <option value="l">Left</option>
      <option value="r">Right</option>
      <option value="u">Up</option>
      <option value="d">Down</option>
    </select>
  </label>

  <div class="legend">
    Calls <code>hyprctl dispatch swapwindow &lt;direction&gt;</code>. Swaps the focused window with its neighbour in the given direction within the same workspace. Pair four keys for a full directional swap pad on the deck — complements the Focus Direction pad.
  </div>

  <script>
    let websocket = null, uuid = null, actionInfo = null;
    function connectElgatoStreamDeckSocket(inPort, inUUID, inRegisterEvent, inInfo, inActionInfo) {
      uuid = inUUID;
      actionInfo = JSON.parse(inActionInfo);
      const settings = actionInfo.payload?.settings ?? {};
      document.getElementById("direction").value = settings.direction ?? "r";
      websocket = new WebSocket("ws://127.0.0.1:" + inPort);
      websocket.onopen = () => websocket.send(JSON.stringify({ event: inRegisterEvent, uuid: inUUID }));
    }
    function send() {
      if (!websocket || websocket.readyState !== 1) return;
      websocket.send(JSON.stringify({
        event: "setSettings", context: uuid,
        payload: { direction: document.getElementById("direction").value },
      }));
    }
    document.getElementById("direction").addEventListener("change", send);
    window.connectElgatoStreamDeckSocket = connectElgatoStreamDeckSocket;
  </script>
</body>
</html>
